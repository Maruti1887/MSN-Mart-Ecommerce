
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MSN Mart - Reset Password</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{

    --primary-color:#4F46E5;
    --primary-hover:#4338CA;
    --secondary-color:#10B981;
    --danger-color:#EF4444;
    --white:#FFFFFF;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    position:relative;

    font-family:'Inter',sans-serif;

    background: linear-gradient(-45deg,
        #4F46E5,
        #7C3AED,
        #06B6D4,
        #10B981);

    background-size:400% 400%;

    animation:gradientBG 15s ease infinite;
}

/* Glow Background */

body::before,
body::after{

    content:'';

    position:absolute;

    width:350px;
    height:350px;

    border-radius:50%;

    background:rgba(255,255,255,0.08);

    filter:blur(40px);

    z-index:0;
}

body::before{
    top:-100px;
    left:-100px;
}

body::after{
    bottom:-100px;
    right:-100px;
}

/* Reset Card */

.reset-container{

    position:relative;
    z-index:2;

    width:100%;
    max-width:430px;

    padding:2.8rem;

    border-radius:22px;

    background:rgba(255,255,255,0.15);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:0 8px 32px rgba(0,0,0,0.2);

    animation:fadeUp 1s ease;
}

/* Brand */

.brand-title{

    text-align:center;

    font-size:2.5rem;

    font-weight:800;

    color:white;

    letter-spacing:1px;

    text-shadow:0 0 18px rgba(255,255,255,0.5);

    animation:glowText 2s infinite alternate;
}

.reset-title{

    margin-top:1rem;

    color:white;

    font-weight:700;

    text-align:center;
}

.reset-subtitle{

    margin-top:0.8rem;

    margin-bottom:2rem;

    text-align:center;

    color:rgba(255,255,255,0.85);

    line-height:1.6;
}

/* Inputs */

.input-group{

    position:relative;

    margin-bottom:1.2rem;
}

.input-group i{

    position:absolute;

    left:1rem;
    top:50%;

    transform:translateY(-50%);

    color:white;

    z-index:3;
}

.form-control{

    background:rgba(255,255,255,0.12);

    border:1px solid rgba(255,255,255,0.15);

    color:white;

    padding:0.9rem 1rem 0.9rem 2.8rem;

    border-radius:14px;

    transition:0.3s ease;
}

.form-control::placeholder{
    color:rgba(255,255,255,0.7);
}

.form-control:focus{

    background:rgba(255,255,255,0.18);

    border-color:white;

    color:white;

    box-shadow:0 0 0 4px rgba(255,255,255,0.1);
}

.form-control:hover{
    transform:scale(1.01);
}

/* Button */

.btn-reset{

    width:100%;

    border:none;

    padding:0.95rem;

    border-radius:14px;

    background:linear-gradient(135deg,
        #ffffff,
        #dbeafe);

    color:#4F46E5;

    font-weight:700;

    position:relative;

    overflow:hidden;

    transition:0.4s ease;
}

.btn-reset::before{

    content:'';

    position:absolute;

    top:0;
    left:-120%;

    width:100%;
    height:100%;

    background:rgba(255,255,255,0.3);

    transition:0.5s;
}

.btn-reset:hover::before{
    left:120%;
}

.btn-reset:hover{

    transform:translateY(-4px) scale(1.02);

    box-shadow:0 12px 28px rgba(255,255,255,0.2);
}

/* Password Strength */

.password-strength{

    height:5px;

    background:rgba(255,255,255,0.15);

    border-radius:10px;

    margin-top:0.5rem;

    overflow:hidden;
}

.password-strength-bar{

    height:100%;

    width:0;

    transition:0.4s ease;

    border-radius:10px;
}

.password-strength-text{

    margin-top:0.4rem;

    font-size:0.85rem;

    color:white;
}

/* Errors */

.error-text{

    color:#FFD1D1;

    font-size:0.85rem;

    margin-top:0.3rem;

    display:block;
}

/* Toast */

.toast{
    border-radius:14px;
}

/* Footer */

.footer{

    position:fixed;

    bottom:15px;

    width:100%;

    text-align:center;

    color:white;

    font-weight:600;

    letter-spacing:1px;

    z-index:2;
}

/* Animations */

@keyframes gradientBG{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes glowText{

    from{
        text-shadow:0 0 10px rgba(255,255,255,0.3);
    }

    to{
        text-shadow:0 0 24px rgba(255,255,255,0.9);
    }
}

</style>

</head>

<body>

<div class="reset-container">

    <h1 class="brand-title">

        <i class="bi bi-shield-lock-fill"></i>

        MSN Mart

    </h1>

    <h2 class="reset-title">

        Secure Password Reset

    </h2>

    <p class="reset-subtitle">

        Enter your verification code and create a strong new password.

    </p>

    <form action="/reset-password"
          method="post"
          th:object="${passwordDto}"
          class="needs-validation"
          novalidate>

        <input type="hidden"
               name="id"
               th:value="${id}">

        <!-- OTP -->

        <div class="input-group">

            <i class="bi bi-key-fill"></i>

            <input type="number"
                   class="form-control"

                   th:field="*{otp}"

                   placeholder="Enter verification code"

                   required

                   pattern="[0-9]*"

                   inputmode="numeric"

                   minlength="6"

                   maxlength="6">

            <div class="invalid-feedback">
                Please enter a valid verification code
            </div>

        </div>

        <!-- Password -->

        <div class="input-group">

            <i class="bi bi-lock-fill"></i>

            <input type="password"
                   class="form-control"

                   th:field="*{password}"

                   placeholder="New password"

                   required

                   minlength="8"

                   id="password">

            <div class="invalid-feedback">
                Password must be at least 8 characters
            </div>

            <span class="error-text"
                  th:if="${#fields.hasErrors('password')}"
                  th:errors="*{password}">
            </span>

        </div>

        <!-- Password Strength -->

        <div class="password-strength">

            <div class="password-strength-bar"
                 id="strengthBar">
            </div>

        </div>

        <div class="password-strength-text"
             id="strengthText">
        </div>

        <!-- Confirm Password -->

        <div class="input-group">

            <i class="bi bi-lock"></i>

            <input type="password"
                   class="form-control"

                   th:field="*{confirmPassword}"

                   placeholder="Confirm password"

                   required

                   minlength="8"

                   id="confirmPassword">

            <div class="invalid-feedback">
                Passwords do not match
            </div>

            <span class="error-text"
                  th:if="${#fields.hasErrors('confirmPassword')}"
                  th:errors="*{confirmPassword}">
            </span>

        </div>

        <!-- Button -->

        <button type="submit"
                class="btn btn-reset mt-3">

            <i class="bi bi-check2-circle me-2"></i>

            Update Password

        </button>

    </form>

</div>

<!-- Footer -->

<footer class="footer">

    © 2026 MSN Mart | Developed by Maruti

</footer>

<!-- Toast Container -->

<div class="toast-container position-fixed top-0 end-0 p-3"
     id="toastContainer">
</div>

<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Script -->

<script th:inline="javascript">

document.addEventListener('DOMContentLoaded', function() {

    // Form Validation

    const form =
        document.querySelector('.needs-validation');

    const password =
        document.getElementById('password');

    const confirmPassword =
        document.getElementById('confirmPassword');

    const strengthBar =
        document.getElementById('strengthBar');

    const strengthText =
        document.getElementById('strengthText');

    if(form){

        form.addEventListener('submit', function(event){

            if(!this.checkValidity()){

                event.preventDefault();
                event.stopPropagation();
            }

            if(password.value !== confirmPassword.value){

                confirmPassword.setCustomValidity(
                    'Passwords do not match'
                );

                event.preventDefault();

            } else {

                confirmPassword.setCustomValidity('');
            }

            this.classList.add('was-validated');

        });
    }

    // Password Strength

    function checkPasswordStrength(passwordValue){

        let strength = 0;

        let tips = [];

        if(passwordValue.length >= 8){

            strength += 25;

        } else {

            tips.push('8 characters');
        }

        if(passwordValue.match(/[A-Z]/)){

            strength += 25;

        } else {

            tips.push('uppercase');
        }

        if(passwordValue.match(/[a-z]/)){

            strength += 25;

        } else {

            tips.push('lowercase');
        }

        if(passwordValue.match(/[0-9]/)){

            strength += 25;

        } else {

            tips.push('number');
        }

        let color;
        let text;

        if(strength === 100){

            color = '#10B981';

            text = 'Strong Password';

        } else if(strength >= 50){

            color = '#F59E0B';

            text = 'Medium Strength - Add ' + tips.join(', ');

        } else {

            color = '#EF4444';

            text = 'Weak Password - Add ' + tips.join(', ');
        }

        strengthBar.style.width = strength + '%';

        strengthBar.style.backgroundColor = color;

        strengthText.textContent = text;

        strengthText.style.color = color;
    }

    if(password){

        password.addEventListener('input', function(){

            checkPasswordStrength(this.value);

            if(confirmPassword.value){

                if(this.value === confirmPassword.value){

                    confirmPassword.setCustomValidity('');

                } else {

                    confirmPassword.setCustomValidity(
                        'Passwords do not match'
                    );
                }
            }
        });
    }

    if(confirmPassword){

        confirmPassword.addEventListener('input', function(){

            if(this.value === password.value){

                this.setCustomValidity('');

            } else {

                this.setCustomValidity(
                    'Passwords do not match'
                );
            }
        });
    }

    // Toast

    function showToast(message, type='success'){

        if(!message) return;

        const toastContainer =
            document.getElementById('toastContainer');

        const toastElement =
            document.createElement('div');

        toastElement.className =
            `toast align-items-center text-bg-${type} border-0 mb-2`;

        toastElement.innerHTML = `
            <div class="d-flex">

                <div class="toast-body">

                    <i class="bi ${
                        type === 'success'
                        ? 'bi-check-circle'
                        : 'bi-exclamation-circle'
                    } me-2"></i>

                    ${message}

                </div>

                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast">
                </button>

            </div>
        `;

        toastContainer.appendChild(toastElement);

        const toast =
            new bootstrap.Toast(toastElement, {

                autohide:true,
                delay:3000
            });

        toast.show();

        toastElement.addEventListener(
            'hidden.bs.toast',
            function(){

                toastElement.remove();
            }
        );
    }

    // Thymeleaf Messages

    const success =
        /*[[${success}]]*/ null;

    const error =
        /*[[${error}]]*/ null;

    if(success)
        showToast(success,'success');

    if(error)
        showToast(error,'danger');

});

</script>

</body>
</html>
