<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MSN Mart - OTP Verification</title>

<!-- Bootstrap CSS & Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root {
    --primary-color: #4F46E5;
    --primary-hover: #4338CA;
    --secondary-color: #6B7280;
    --success-color: #10B981;
    --danger-color: #EF4444;
    --white: #FFFFFF;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {

    font-family: 'Inter', sans-serif;

    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    overflow:hidden;
    position:relative;

    background: linear-gradient(-45deg,
        #4F46E5,
        #7C3AED,
        #06B6D4,
        #10B981);

    background-size: 400% 400%;

    animation: gradientBG 15s ease infinite;
}

/* Glow Circles */
body::before,
body::after{

    content:'';

    position:absolute;

    width:350px;
    height:350px;

    border-radius:50%;

    background:rgba(255,255,255,0.08);

    filter:blur(40px);

    z-index:0;
}

body::before{
    top:-100px;
    left:-100px;
}

body::after{
    bottom:-100px;
    right:-100px;
}

/* OTP Card */

.otp-container {

    position:relative;
    z-index:2;

    width:100%;
    max-width:430px;

    padding:2.8rem;

    border-radius:20px;

    background: rgba(255,255,255,0.15);

    backdrop-filter: blur(18px);

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:0 8px 32px rgba(0,0,0,0.2);

    text-align:center;

    animation:fadeUp 1s ease;
}

/* Brand */

.brand-title{

    font-size:2.5rem;

    font-weight:800;

    color:white;

    letter-spacing:1px;

    text-shadow:0 0 18px rgba(255,255,255,0.4);

    animation:glowText 2s infinite alternate;
}

.verify-title{

    margin-top:1rem;

    color:white;

    font-weight:700;
}

.verify-subtitle{

    margin-top:0.8rem;

    color:rgba(255,255,255,0.85);

    line-height:1.6;
}

/* Form */

.otp-form{
    margin-top:2rem;
}

.input-group{

    position:relative;

    margin-bottom:1.5rem;
}

.input-group i{

    position:absolute;

    left:1rem;
    top:50%;

    transform:translateY(-50%);

    color:white;

    z-index:3;
}

.form-control{

    background: rgba(255,255,255,0.12);

    border:1px solid rgba(255,255,255,0.15);

    color:white;

    padding:0.9rem 1rem 0.9rem 2.8rem;

    border-radius:14px;

    transition:0.3s ease;
}

.form-control::placeholder{
    color:rgba(255,255,255,0.7);
}

.form-control:focus{

    background: rgba(255,255,255,0.18);

    border-color:white;

    color:white;

    box-shadow:0 0 0 4px rgba(255,255,255,0.1);
}

.form-control:hover{
    transform:scale(1.01);
}

/* Verify Button */

.btn-submit{

    width:100%;

    border:none;

    padding:0.9rem;

    border-radius:14px;

    background: linear-gradient(135deg,
        #ffffff,
        #dbeafe);

    color:#4F46E5;

    font-weight:700;

    position:relative;

    overflow:hidden;

    transition:0.4s ease;
}

.btn-submit::before{

    content:'';

    position:absolute;

    top:0;
    left:-120%;

    width:100%;
    height:100%;

    background:rgba(255,255,255,0.3);

    transition:0.5s;
}

.btn-submit:hover::before{
    left:120%;
}

.btn-submit:hover{

    transform:translateY(-4px) scale(1.02);

    box-shadow:0 12px 28px rgba(255,255,255,0.2);
}

/* Resend Link */

.resend-link{

    display:inline-block;

    margin-top:1.5rem;

    color:white;

    font-weight:600;

    text-decoration:none;

    transition:0.3s ease;
}

.resend-link:hover{

    color:#dbeafe;

    transform:translateY(-2px);
}

/* Footer */

.footer{

    position:fixed;

    bottom:15px;

    width:100%;

    text-align:center;

    color:white;

    font-weight:600;

    letter-spacing:1px;

    z-index:2;
}

/* Toast */

.toast{
    border-radius:14px;
}

/* Animations */

@keyframes gradientBG{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes glowText{

    from{
        text-shadow:0 0 10px rgba(255,255,255,0.3);
    }

    to{
        text-shadow:0 0 24px rgba(255,255,255,0.9);
    }
}

</style>

</head>

<body>

<div class="otp-container">

    <h1 class="brand-title">
        <i class="bi bi-shield-lock-fill"></i>
        MSN Mart
    </h1>

    <h2 class="verify-title">
        Secure OTP Verification
    </h2>

    <p class="verify-subtitle">
        Please enter the 6-digit verification code sent to your registered email address.
    </p>

    <form action="/otp"
          method="post"
          class="otp-form needs-validation"
          novalidate>

        <input type="hidden"
               name="id"
               th:value="${id}">

        <div class="input-group">

            <i class="bi bi-key-fill"></i>

            <input type="number"
                   name="otp"
                   class="form-control"

                   placeholder="Enter verification code"

                   required

                   pattern="[0-9]*"

                   inputmode="numeric"

                   minlength="6"

                   maxlength="6">

            <div class="invalid-feedback">
                Please enter a valid 6-digit OTP
            </div>

        </div>

        <button type="submit" class="btn btn-submit">

            <i class="bi bi-check2-circle me-2"></i>

            Verify OTP

        </button>

    </form>

    <a class="resend-link"
       th:href="'/resend-otp?id='+${id}">

        <i class="bi bi-arrow-repeat me-1"></i>

        Resend Verification Code

    </a>

</div>

<!-- Footer -->
<footer class="footer">
    © 2026 MSN Mart | Developed by Maruti
</footer>

<!-- Toast Container -->
<div class="toast-container position-fixed top-0 end-0 p-3"
     id="toastContainer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Validation & Toast -->
<script th:inline="javascript">

document.addEventListener('DOMContentLoaded', function() {

    // Form Validation
    const form =
        document.querySelector('.needs-validation');

    if(form){

        form.addEventListener('submit', function(event){

            if(!this.checkValidity()){

                event.preventDefault();
                event.stopPropagation();
            }

            this.classList.add('was-validated');
        });
    }

    // OTP Input Limit
    const otpInput =
        document.querySelector('input[name="otp"]');

    if(otpInput){

        otpInput.addEventListener('input', function(){

            if(this.value.length > 6){

                this.value =
                    this.value.slice(0,6);
            }
        });
    }

    // Toast Function
    function showToast(message, type='success'){

        if(!message) return;

        const toastContainer =
            document.getElementById('toastContainer');

        const toastElement =
            document.createElement('div');

        toastElement.className =
            `toast align-items-center text-bg-${type} border-0 mb-2`;

        toastElement.innerHTML = `
            <div class="d-flex">

                <div class="toast-body">

                    <i class="bi ${
                        type === 'success'
                        ? 'bi-check-circle'
                        : 'bi-exclamation-circle'
                    } me-2"></i>

                    ${message}

                </div>

                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast">
                </button>

            </div>
        `;

        toastContainer.appendChild(toastElement);

        const toast =
            new bootstrap.Toast(toastElement, {

                autohide:true,
                delay:3000
            });

        toast.show();
    }

    // Thymeleaf Messages

    const success =
        /*[[${success}]]*/ null;

    const error =
        /*[[${error}]]*/ null;

    if(success){
        showToast(success,'success');
    }

    if(error){
        showToast(error,'danger');
    }

});

</script>

</body>
</html>
