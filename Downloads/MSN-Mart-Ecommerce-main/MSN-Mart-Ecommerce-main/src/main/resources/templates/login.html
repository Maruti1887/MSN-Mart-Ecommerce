<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSN Mart - Login</title>

<!-- Bootstrap CSS & Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root {
    --primary-color: #4F46E5;
    --primary-hover: #4338CA;
    --secondary-color: #6B7280;
    --success-color: #10B981;
    --danger-color: #EF4444;
    --white: #FFFFFF;
    --glass-bg: rgba(255,255,255,0.15);
    --glass-border: rgba(255,255,255,0.2);
    --border-radius: 18px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;

    background: linear-gradient(-45deg,
        #4F46E5,
        #7C3AED,
        #06B6D4,
        #10B981);

    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
}

/* Floating Glow Circles */
body::before,
body::after{
    content:'';
    position:absolute;
    width:350px;
    height:350px;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    filter: blur(40px);
    z-index:0;
}

body::before{
    top:-100px;
    left:-100px;
}

body::after{
    bottom:-100px;
    right:-100px;
}

/* Login Card */
.login-container {
    position: relative;
    z-index: 2;

    width: 100%;
    max-width: 430px;

    padding: 2.8rem;

    border-radius: var(--border-radius);

    background: rgba(255,255,255,0.15);

    backdrop-filter: blur(18px);

    border: 1px solid rgba(255,255,255,0.2);

    box-shadow:
        0 8px 32px rgba(0,0,0,0.2);

    animation: fadeUp 1s ease;
}

/* Brand */
.brand-title{
    font-size:2.5rem;
    font-weight:800;
    color:white;
    text-align:center;
    margin-bottom:0.5rem;
    letter-spacing:1px;

    animation: glowText 2s infinite alternate;
}

.brand-subtitle{
    text-align:center;
    color:rgba(255,255,255,0.85);
    margin-bottom:2rem;
    font-size:0.96rem;
}

/* Inputs */
.input-group{
    position:relative;
    margin-bottom:1.3rem;
}

.input-group i{
    position:absolute;
    left:1rem;
    top:50%;
    transform:translateY(-50%);
    color:white;
    z-index:3;
}

.form-control{
    background: rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.15);
    color:white;

    padding:0.85rem 1rem 0.85rem 2.8rem;

    border-radius:14px;

    transition:0.3s ease;
}

.form-control::placeholder{
    color:rgba(255,255,255,0.7);
}

.form-control:focus{
    background: rgba(255,255,255,0.18);
    border-color:white;
    color:white;

    box-shadow:0 0 0 4px rgba(255,255,255,0.1);
}

.form-control:hover{
    transform:scale(1.01);
}

/* Login Button */
.btn-login{
    width:100%;
    border:none;

    background: linear-gradient(135deg,
        #ffffff,
        #dbeafe);

    color:#4F46E5;

    font-weight:700;

    padding:0.9rem;

    border-radius:14px;

    transition:0.4s ease;

    position:relative;
    overflow:hidden;

    margin-top:0.5rem;
}

.btn-login::before{
    content:'';
    position:absolute;
    top:0;
    left:-120%;

    width:100%;
    height:100%;

    background:rgba(255,255,255,0.3);

    transition:0.5s;
}

.btn-login:hover::before{
    left:120%;
}

.btn-login:hover{
    transform:translateY(-4px) scale(1.02);

    box-shadow:0 12px 28px rgba(255,255,255,0.2);
}

/* Divider */
.divider{
    display:flex;
    align-items:center;
    text-align:center;
    color:white;
    margin:1.5rem 0;
}

.divider::before,
.divider::after{
    content:'';
    flex:1;
    border-bottom:1px solid rgba(255,255,255,0.2);
}

.divider span{
    margin:0 1rem;
}

/* Links */
.links{
    text-align:center;
    color:white;
}

.links a{
    color:white;
    text-decoration:none;
    font-weight:600;
    transition:0.3s ease;
}

.links a:hover{
    color:#dbeafe;
    text-decoration:none;
}

/* Footer */
.footer{
    position:fixed;
    bottom:15px;
    width:100%;
    text-align:center;
    color:white;
    font-weight:600;
    letter-spacing:1px;
    z-index:2;
}

/* Toast */
.toast{
    border-radius:14px;
}

/* Animations */

@keyframes gradientBG{
    0%{
        background-position:0% 50%;
    }
    50%{
        background-position:100% 50%;
    }
    100%{
        background-position:0% 50%;
    }
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes glowText{
    from{
        text-shadow:0 0 10px rgba(255,255,255,0.3);
    }
    to{
        text-shadow:0 0 25px rgba(255,255,255,0.9);
    }
}

</style>
</head>

<body>

<div class="login-container">

    <h1 class="brand-title">
        <i class="bi bi-bag-heart-fill"></i>
        MSN Mart
    </h1>

    <p class="brand-subtitle">
        Welcome back! Login to continue your shopping journey.
    </p>

    <form action="/login" method="post" class="needs-validation" novalidate>

        <div class="input-group">
            <i class="bi bi-envelope-fill"></i>

            <input type="email"
                   class="form-control"
                   placeholder="Email address"
                   name="username"
                   required>

            <div class="invalid-feedback">
                Please enter a valid email address
            </div>
        </div>

        <div class="input-group">
            <i class="bi bi-lock-fill"></i>

            <input type="password"
                   class="form-control"
                   placeholder="Password"
                   name="password"
                   required minlength="6">

            <div class="invalid-feedback">
                Password is required
            </div>
        </div>

        <button type="submit" class="btn btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>
            Login
        </button>

    </form>

    <div class="divider">
        <span>or</span>
    </div>

    <div class="links">

        <div class="mb-2">
            <a href="/forgot-password">
                <i class="bi bi-key-fill me-1"></i>
                Forgot Password?
            </a>
        </div>

        <div>
            Don't have an account?
            <a href="/register">
                <i class="bi bi-person-plus-fill me-1"></i>
                Register
            </a>
        </div>

    </div>

</div>

<!-- Footer -->
<footer class="footer">
    © 2026 MSN Mart | Developed by Maruti
</footer>

<!-- Toast Container -->
<div class="toast-container position-fixed top-0 end-0 p-3"
     id="toastContainer"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Toast Messages -->
<script th:inline="javascript">

document.addEventListener('DOMContentLoaded', function() {

    // Form validation
    const form = document.querySelector('.needs-validation');

    if (form) {

        form.addEventListener('submit', function(event) {

            if (!this.checkValidity()) {

                event.preventDefault();
                event.stopPropagation();
            }

            this.classList.add('was-validated');
        });
    }

    // Toast Function
    function showToast(message, type = 'success') {

        if (!message) return;

        const toastContainer =
            document.getElementById('toastContainer');

        const toastElement =
            document.createElement('div');

        toastElement.className =
            `toast align-items-center text-bg-${type} border-0 mb-2`;

        toastElement.setAttribute('role', 'alert');

        toastElement.innerHTML = `
            <div class="d-flex">
                <div class="toast-body">
                    <i class="bi ${
                        type === 'success'
                        ? 'bi-check-circle'
                        : 'bi-exclamation-circle'
                    } me-2"></i>

                    ${message}
                </div>

                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast">
                </button>
            </div>
        `;

        toastContainer.appendChild(toastElement);

        const toast =
            new bootstrap.Toast(toastElement, {

                autohide: true,
                delay: 3000
            });

        toast.show();
    }

    // Thymeleaf Messages
    const success =
        /*[[${success}]]*/ null;

    const failure =
        /*[[${failure}]]*/ null;

    const hasError =
        /*[[${param.error != null}]]*/ false;

    const hasLogout =
        /*[[${param.logout != null}]]*/ false;

    if (success)
        showToast(success, 'success');

    if (failure)
        showToast(failure, 'danger');

    if (hasError)
        showToast('Invalid Credentials', 'danger');

    if (hasLogout)
        showToast('Logout Successful', 'success');

});

</script>

</body>
</html>
